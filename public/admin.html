<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="utf-8">
<title>Admin Panel</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="box" id="adminBox">
<h2>Admin Panel</h2>
<div id="usersList"></div>
<button onclick="logout()">Logout</button>
</div>

<script>
const API = "/api";
let adminUser = null;

async function loadUsers() {
    const res = await fetch(API + "/admin/users");
    if (!res.ok) return alert("Access denied");
    const data = await res.json();

    adminUser = Object.keys(data).find(u => data[u].isAdmin);
    const cont = document.getElementById("usersList");
    cont.innerHTML = "";

    Object.keys(data).forEach(username => {
        const div = document.createElement("div");
        div.className = "folder";
        div.textContent = username + (data[username].isAdmin ? " (Admin)" : "");

        if (!data[username].isAdmin) {
            const makeBtn = document.createElement("button");
            makeBtn.textContent = "Make Admin";
            makeBtn.className = "small";
            makeBtn.onclick = async () => {
                await fetch(API + `/admin/users/${username}/makeAdmin`, { method: "POST" });
                loadUsers();
            };
            div.appendChild(makeBtn);
        }

        const delBtn = document.createElement("button");
        delBtn.textContent = "Delete User";
        delBtn.className = "small";
        delBtn.onclick = async () => {
            if (confirm("Delete this user?")) {
                await fetch(API + `/admin/users/${username}`, { method: "DELETE" });
                loadUsers();
            }
        };
        div.appendChild(delBtn);

        cont.appendChild(div);
    });
}

function logout() {
    fetch("/logout"); // می‌تونی این رو اضافه کنی در سرور
    window.location.href = "/";
}

loadUsers();
</script>
</body>
</html>
